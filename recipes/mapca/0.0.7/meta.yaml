{% set name = "mapca" %}
{% set version = "0.0.7" %}
{% set sha256 = "29b39c049cd69925c795ba99a5c50876fdae20fc2d32b22c4f2b4d2a74372014" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/{{ name|lower }}/{{ name|lower }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage(name|lower, max_pin="x.x") }}

requirements:
  host:
    - python >=3.8
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=3.8
    - nibabel >=2.5.1
    - nilearn
    - numpy >=1.16
    - scikit-learn >=1.2
    - scipy >=1.3.3

test:
  imports:
    - mapca

about:
  home: https://github.com/ME-ICA/mapca
  summary: Moving Average Principal Component Analysis for fMRI data
  doc_url: https://www.mapca.readthedocs.io
  license: GPL-2.0-only
  license_file: LICENSE
