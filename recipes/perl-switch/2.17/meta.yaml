{% set name = "perl-switch" %}
{% set version = "2.17" %}
{% set sha256 = "31354975140fe6235ac130a109496491ad33dd42f9c62189e23f49f75f936d75" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/C/CH/CHORNY/Switch-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - make
  host:
    - perl <5.32
    - perl-text-balanced
    - perl-filter-simple
  run:
    - perl <5.32
    - perl-text-balanced
    - perl-filter-simple

test:
  imports:
    - Switch

about:
  home: "https://metacpan.org/pod/Switch"
  license: "Perl_5"
  summary: "A switch statement for Perl, do not use if you can use given/when."
  doc_url: "https://metacpan.org/pod/Switch"
