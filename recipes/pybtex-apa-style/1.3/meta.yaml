{% set name = "pybtex-apa-style" %}
{% set version = "1.3" %}
{% set sha256 = "38a6d11e8f40f259b1d0a6974b6dbae93edbe009c247d83de14c26bdd965afb2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/{{ name|lower }}/{{ name|lower }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage(name|lower, max_pin="x") }}

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python

test:
  imports:
    - formatting
    - labels
    - names

about:
  home: https://github.com/naeka/pybtex-apa-style
  summary: Pybtex APA-like style
  license: MIT
  license_file: LICENSE
